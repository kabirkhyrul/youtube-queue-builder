name: Release

on:
  push:
    branches:
      - publish

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build extension
        run: bun run build

      - name: Read package info
        id: package
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: zip -r "${{ steps.package.outputs.name }}-${{ steps.package.outputs.version }}.zip" dist

      - name: Create release tag
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG_NAME="${{ steps.package.outputs.name }}-v${{ steps.package.outputs.version }}-${SHORT_SHA}"
          git tag "$TAG_NAME" "$GITHUB_SHA"
          git push origin "$TAG_NAME"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag_name }}" \
            "${{ steps.package.outputs.name }}-${{ steps.package.outputs.version }}.zip" \
            --title "${{ steps.package.outputs.name }} v${{ steps.package.outputs.version }}" \
            --notes "Automated release for commit ${{ github.sha }}"
